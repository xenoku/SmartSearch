<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Интеллектуальный поиск документов</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" type="image/x-icon" href="/static/assets/favicon.ico">
</head>
<body>
    <div class="container">
        <h2>Поисковая система документов</h2>
        
        <form id="js-search-form" class="section">
            <div class="flex-inputs">
                <input type="text" class="input-field js-search-input" placeholder="Введите контекстный или лексический запрос (например: отчет по продажам)..." required>
                <select class="limit-select limit-select-count" title="Количество результатов">
                    <option value="3" selected>Топ 3</option>
                    <option value="5">Топ 5</option>
                    <option value="10">Топ 10</option>
                </select>
                <button type="submit" class="btn-success">Найти документ</button>
            </div>

            <fieldset class="search-filters-fieldset">
                <legend class="search-filters-legend">Фильтры поиска</legend>
                <div class="search-filters-grid">
                    <div class="filter-control-group">
                        <label class="filter-label">Автор / Издатель</label>
                        <input type="text" class="filter-input js-filter-author" placeholder="Имя автора">
                    </div>
                    <div class="filter-control-group">
                        <label class="filter-label">Название / Расширение</label>
                        <input type="text" class="filter-input js-filter-filename" placeholder="Например: .pdf">
                    </div>
                    <div class="filter-control-group">
                        <label class="filter-label">Написан (с)</label>
                        <input type="date" class="filter-input js-created-after">
                    </div>
                    <div class="filter-control-group">
                        <label class="filter-label">Написан (до)</label>
                        <input type="date" class="filter-input js-created-before">
                    </div>
                    <div class="filter-control-group">
                        <label class="filter-label">Добавлен в базу (с)</label>
                        <input type="date" class="filter-input js-added-after">
                    </div>
                    <div class="filter-control-group">
                        <label class="filter-label">Добавлен в базу (до)</label>
                        <input type="date" class="filter-input js-added-before">
                    </div>
                </div>
            </fieldset>

            <div class="metrics-output"></div>
            <div class="js-results-container results-container"></div>
        </form>
        
        <div class="admin-link-wrapper">
            <a href="/admin" class="admin-redirect-link">Панель управления (Администратор)</a>
        </div>
    </div>

    <div id="js-toast-container" class="toast-container"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
